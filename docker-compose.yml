version: '3.8'
# Neo4j Knowledge Graph added — powers semantic interest matching (AtlasAI alignment)

services:
  redis:
    image: redis:7-alpine
    container_name: routed-redis
    ports:
      - "6379:6379"
    networks:
      - routed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: routed-postgres
    env_file:
      - env/.env
    environment:
      POSTGRES_USER: routed_user
      POSTGRES_PASSWORD: routed_password
      POSTGRES_DB: routed
    ports:
      - "5434:5432"   # use 5434 on host instead of 5433
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - routed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: routed-neo4j
    env_file:
      - env/.env
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-routedgraph}
      - NEO4J_PLUGINS=[]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
    networks:
      - routed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: routed-backend
    env_file:
      - env/.env
    environment:
      - PYTHONPATH=/app/src
    ports:
      - "8000:8000"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/src:/app/src
    networks:
      - routed-network
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: routed-celery-worker
    env_file:
      - env/.env
    environment:
      - PYTHONPATH=/app/src
    command: celery -A backend.workers.celery_app worker -l info
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/src:/app/src
    networks:
      - routed-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: routed-frontend
    env_file:
      - env/.env
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - routed-network
    restart: unless-stopped

networks:
  routed-network:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
