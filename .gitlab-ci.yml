stages:
  - test

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  POETRY_VIRTUALENVS_CREATE: 'false'
  POSTGRES_USER: routed_user
  POSTGRES_PASSWORD: routed_password
  POSTGRES_DB: routed_test
  POSTGRES_HOST: postgres
  POSTGRES_PORT: '5432'
  RESET_DB_ON_STARTUP: 'false'

backend-tests:
  stage: test
  image: git.uwaterloo.ca:5050/h3sood/routed/routed-backend:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
         - backend/**/*
    - changes:
      - .gitlab-ci.yml
  services:
    - name: postgis/postgis:latest
      alias: postgres
      pull_policy: if-not-present
      variables:
        POSTGRES_USER: routed_user
        POSTGRES_PASSWORD: routed_password
        POSTGRES_DB: routed_test
  cache:
    key: poetry-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .cache/pypoetry
  script:
    - cd backend
    - poetry install --no-interaction --no-ansi
    - for i in $(seq 1 60); do pg_isready -h postgres -p 5432 && break; sleep 1; done
    - pg_isready -h postgres -p 5432
    - poetry run pytest -q --maxfail=2

model_tests:
  stage: test
  image: git.uwaterloo.ca:5050/h3sood/routed/routed-backend:latest
  rules:
    - changes:
        - backend/model/**/*
        - .gitlab-ci.yml
    - when: never
  cache:
    key: poetry-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .cache/pypoetry
  script:
    - cd backend
    - poetry install --no-interaction --no-ansi
    - poetry run pytest -q --maxfail=2 #Run all tests as changes to model files can affect multiple test files, so we run all tests instead of just model tests

userRoutes-tests:
  stage: test
  image: git.uwaterloo.ca:5050/h3sood/routed/routed-backend:latest
  rules:
    - changes:
        - backend/userRoutes/**/*
        - .gitlab-ci.yml
    - when: never
  cache:
    key: poetry-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .cache/pypoetry
  script:
    - cd backend/tests
    - poetry install --no-interaction --no-ansi
    - poetry run pytest test_user_routes.py test_jwt_auth.py -q --maxfail=2

