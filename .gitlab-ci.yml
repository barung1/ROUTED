stages:
  - build
  - test

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  POETRY_VIRTUALENVS_CREATE: 'false'
  POSTGRES_USER: routed_user
  POSTGRES_PASSWORD: routed_password
  POSTGRES_DB: routed_test
  POSTGRES_HOST: postgres
  POSTGRES_PORT: '5432'
  RESET_DB_ON_STARTUP: 'false'
  REGISTRY_URL: "git.uwaterloo.ca:5050"
  BACKEND_IMAGE: "$REGISTRY_URL/h3sood/routed/routed-backend:latest"

backend-image:
  stage: build
  image:
    name: moby/buildkit:rootless
    pull_policy: if-not-present
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
  rules:
    - changes:
        - backend/Dockerfile
        - backend/pyproject.toml
        - backend/poetry.lock
        - .gitlab-ci.yml
    - when: never
  script:
    - DEP_HASH=$(cat backend/pyproject.toml backend/poetry.lock | sha256sum | cut -d' ' -f1 | cut -c1-12)
    - BACKEND_IMAGE_HASH="$REGISTRY_URL/h3sood/routed/routed-backend:deps-$DEP_HASH"
    - mkdir -p "$HOME/.docker"
    - echo "{\"auths\":{\"$REGISTRY_URL\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_JOB_TOKEN\"}}}" > "$HOME/.docker/config.json"
    - buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=backend \
        --local dockerfile=backend \
        --output type=image,name="$BACKEND_IMAGE",push=true \
        --output type=image,name="$BACKEND_IMAGE_HASH",push=true

backend-tests:
  stage: test
  before_script:
    - DEP_HASH=$(cat backend/pyproject.toml backend/poetry.lock | sha256sum | cut -d' ' -f1 | cut -c1-12)
    - export BACKEND_IMAGE_HASH="$REGISTRY_URL/h3sood/routed/routed-backend:deps-$DEP_HASH"
  image:
    name: $BACKEND_IMAGE_HASH
    pull_policy: if-not-present
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**/*
    - changes:
        - .gitlab-ci.yml
  services:
    - name: postgis/postgis:latest
      alias: postgres
      pull_policy: if-not-present
      variables:
        POSTGRES_USER: routed_user
        POSTGRES_PASSWORD: routed_password
        POSTGRES_DB: routed_test
  cache:
    key: poetry-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .cache/pypoetry
  script:
    - cd backend
    - for i in $(seq 1 60); do pg_isready -h postgres -p 5432 && break; sleep 1; done
    - pg_isready -h postgres -p 5432
    - PYTHONPATH=src pytest -q --maxfail=2

model_tests:
  stage: test
  before_script:
    - DEP_HASH=$(cat backend/pyproject.toml backend/poetry.lock | sha256sum | cut -d' ' -f1 | cut -c1-12)
    - export BACKEND_IMAGE_HASH="$REGISTRY_URL/h3sood/routed/routed-backend:deps-$DEP_HASH"
  image:
    name: $BACKEND_IMAGE_HASH
    pull_policy: if-not-present
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**/*
      when: never
    - changes:
        - backend/models/**
    - when: never
  cache:
    key: poetry-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .cache/pypoetry
  script:
    - cd backend
    - PYTHONPATH=src pytest -q --maxfail=2 #Run all tests as changes to model files can affect multiple test files, so we run all tests instead of just model tests

userRoutes-tests:
  stage: test
  before_script:
    - DEP_HASH=$(cat backend/pyproject.toml backend/poetry.lock | sha256sum | cut -d' ' -f1 | cut -c1-12)
    - export BACKEND_IMAGE_HASH="$REGISTRY_URL/h3sood/routed/routed-backend:deps-$DEP_HASH"
  image:
    name: $BACKEND_IMAGE_HASH
    pull_policy: if-not-present
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**/*
      when: never
    - changes:
        - backend/userRoutes/**
        - .gitlab-ci.yml
    - when: never
  cache:
    key: poetry-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .cache/pypoetry
  script:
    - cd backend/tests
    - PYTHONPATH=../src pytest test_user_routes.py test_jwt_auth.py -q --maxfail=2

