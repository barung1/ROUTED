stages:
  - test

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  POETRY_VIRTUALENVS_CREATE: 'false'
  POSTGRES_USER: routed_user
  POSTGRES_PASSWORD: routed_password
  POSTGRES_DB: routed_test
  POSTGRES_HOST: postgres
  POSTGRES_PORT: '5432'
  RESET_DB_ON_STARTUP: 'false'

backend-tests:
  stage: test
  image: git.uwaterloo.ca:5050/h3sood/routed/routed-backend:latest
  services:
    - name: postgis/postgis:16-3.4
      alias: postgres
  cache:
    key: poetry-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .cache/pypoetry
  script:
    - cd backend
    - poetry install --no-interaction --no-ansi
    - until pg_isready -h postgres -p 5432; do sleep 0.5; done
    - poetry run pytest -q --maxfail=2