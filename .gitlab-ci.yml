  stage: test
  image:
    name: $BACKEND_IMAGE
    pull_policy: always
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**/*
      when: never
    - changes:
        - backend/src/backend/routes/location.py
        - backend/tests/test_location_routes.py
  services:
    - name: $POSTGIS_IMAGE
      alias: postgres
      pull_policy: if-not-present
  cache:
    key: poetry-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .cache/pypoetry
  artifacts:
    when: always
    paths:
      - backend/test-reports/
    reports:
      junit: backend/test-reports/locationRoutes.xml
  script:
    - cd backend/tests
    - for i in $(seq 1 60); do pg_isready -h postgres -p 5432 && break; sleep 1; done
    - pg_isready -h postgres -p 5432
    - mkdir -p ../test-reports
    - PYTHONPATH=../src pytest test_location_routes.py -q --maxfail=3 --junitxml=../test-reports/locationRoutes.xml

