stages:
  - build
  - test

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  POETRY_VIRTUALENVS_CREATE: 'false'
  POSTGRES_USER: routed_user
  POSTGRES_PASSWORD: routed_password
  POSTGRES_DB: routed_test
  POSTGRES_HOST: postgres
  POSTGRES_PORT: '5432'
  RESET_DB_ON_STARTUP: 'false'
  REGISTRY_URL: "git.uwaterloo.ca:5050"
  BACKEND_IMAGE: "$REGISTRY_URL/h3sood/routed/routed-backend:latest"

backend-image:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
      pull_policy: if-not-present
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  rules:
    - changes:
        - backend/Dockerfile
        - backend/pyproject.toml
        - backend/poetry.lock
        - .gitlab-ci.yml
    - when: never
  script:
    - DEP_HASH=$(cat backend/pyproject.toml backend/poetry.lock | sha256sum | cut -d' ' -f1 | cut -c1-12)
    - BACKEND_IMAGE_HASH="$REGISTRY_URL/h3sood/routed/routed-backend:deps-$DEP_HASH"
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_JOB_TOKEN" "$REGISTRY_URL"
    - docker build -t "$BACKEND_IMAGE" -t "$BACKEND_IMAGE_HASH" -f backend/Dockerfile backend
    - docker push "$BACKEND_IMAGE"
    - docker push "$BACKEND_IMAGE_HASH"

backend-tests:
  stage: test
  image:
    name: $BACKEND_IMAGE
    pull_policy: if-not-present
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**/*
    - changes:
        - .gitlab-ci.yml
  services:
    - name: postgis/postgis:latest
      alias: postgres
      pull_policy: if-not-present
      variables:
        POSTGRES_USER: routed_user
        POSTGRES_PASSWORD: routed_password
        POSTGRES_DB: routed_test
  cache:
    key: poetry-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .cache/pypoetry
  script:
    - cd backend
    - for i in $(seq 1 60); do pg_isready -h postgres -p 5432 && break; sleep 1; done
    - pg_isready -h postgres -p 5432
    - PYTHONPATH=src pytest -q --maxfail=2

model_tests:
  stage: test
  image:
    name: $BACKEND_IMAGE
    pull_policy: if-not-present
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**/*
      when: never
    - changes:
        - backend/models/**
    - when: never
  cache:
    key: poetry-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .cache/pypoetry
  script:
    - cd backend
    - PYTHONPATH=src pytest -q --maxfail=2 #Run all tests as changes to model files can affect multiple test files, so we run all tests instead of just model tests

userRoutes-tests:
  stage: test
  image:
    name: $BACKEND_IMAGE
    pull_policy: if-not-present
  rules:
    - changes:
        - backend/userRoutes/**
        - .gitlab-ci.yml
    - when: never
  cache:
    key: poetry-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - .cache/pypoetry
  script:
    - cd backend/tests
    - PYTHONPATH=../src pytest test_user_routes.py test_jwt_auth.py -q --maxfail=2

